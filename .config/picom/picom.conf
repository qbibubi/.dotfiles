#################################
#             QBIBUBI           #
#################################

backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# Opacity
active-opacity = 1;
inactive-opacity = 1;
inactive-opacity-override = false;

# Fading
fading = false;
#fade-delta = 4;
#no-fading-openclose = false;
#fade-exclude = [];

# Other
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = false;
detect-client-opacity = true;
refresh-rate = 0;
vsync = true;
dbe = false;
unredir-if-possible = false;
focus-exclude = [ ];
detect-transient = true;
detect-client-leader = true;

# Window type settings
wintypes:
{
		dock = {
				shadow = false;
		};
};

shadow = true;
shadow-radius = 0.1;
shadow-offset-x = 0.1;
shadow-offset-y = 0.1;
shadow-opacity = 0.5;

shadow-exclude = [
    "! name~=''",
    "name *= 'VLC'",
    "name *= 'compton'",
    "name *= 'picom'",
    "name *= 'Chromium'",
    "name *= 'Chrome'",
    "name *= 'Discord'",
    "class_g = 'firefoxdeveloperedition' && argb"
];

xrender-sync-fence = true;
